spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    # TODO: 실제 운영 PostgreSQL host:port/db, 계정으로 교체
    url: jdbc:postgresql://prod-db-host:5432/precheck
    username: precheck
    password: precheck
    hikari:
      maximum-pool-size: 10
      pool-name: PreCheckPool-Prod

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

precheck:
  collect-schedule-path: /home/precheck/cfg/PreCheck_CollectLogs_Schedule.conf
  analyze-schedule-path: /home/precheck/cfg/PreCheck_AnalyzeLogs_Schedule.conf
