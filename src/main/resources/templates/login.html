<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PreCheck Dashboard 로그인</title>
    <link rel="stylesheet" th:href="@{/plugins/bootstrap-icons/bootstrap-icons.css}">
    <link rel="stylesheet" th:href="@{/css/adminlte.min.css}">
    <link rel="stylesheet" th:href="@{/css/precheck-theme.css}">
    <script th:src="@{/js/precheck-theme.js}"></script>
    <style>
        body.login-page {
            background: linear-gradient(90deg, #a8ccf0 0%, #bdd8f5 30%, #d0e6f8 65%, #e0eff9 100%);
            position: relative;
        }
        body.login-page::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                repeating-linear-gradient(45deg, rgba(20, 80, 160, .09) 0 1px, transparent 1px 12px),
                repeating-linear-gradient(-45deg, rgba(20, 80, 160, .09) 0 1px, transparent 1px 12px);
            pointer-events: none;
        }
        .login-box {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body class="login-page">
<div class="login-box">
    <div class="card card-outline card-primary">
        <div class="card-header text-center">
            <span class="h1"><b>PreCheck</b> Dashboard</span>
        </div>
        <div class="card-body login-card-body">
            <p class="login-box-msg">관리자 로그인</p>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/login}" method="post">
                <div class="input-group mb-3">
                    <input type="text" name="username" class="form-control" placeholder="아이디" required autofocus>
                    <div class="input-group-text"><span class="bi bi-person"></span></div>
                </div>
                <div class="input-group mb-3">
                    <input type="password" id="loginPassword" name="password" class="form-control" placeholder="비밀번호" required>
                    <button type="button" class="input-group-text" onclick="togglePwd('loginPassword', this)" tabindex="-1">
                        <span class="bi bi-eye"></span>
                    </button>
                </div>
                <div class="row">
                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-primary">로그인</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    function togglePwd(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('span');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }
</script>
</body>
</html>
