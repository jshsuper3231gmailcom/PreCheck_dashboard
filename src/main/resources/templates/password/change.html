<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>비밀번호 변경 - PreCheck Dashboard</title>
    <link rel="stylesheet" th:href="@{/plugins/bootstrap-icons/bootstrap-icons.css}">
    <link rel="stylesheet" th:href="@{/css/adminlte.min.css}">
</head>
<body class="login-page bg-body-secondary">
<div class="login-box" style="width: 420px;">
    <div class="card card-outline card-primary">
        <div class="card-header text-center">
            <span class="h1"><b>PreCheck</b> Dashboard</span>
        </div>
        <div class="card-body login-card-body">
            <p class="login-box-msg">
                비밀번호 변경 <small class="text-muted" th:text="'(' + ${userName} + ')'"></small>
            </p>

            <div th:if="${forced}" class="alert alert-warning">
                비밀번호가 만료되었거나 최초 로그인입니다. 비밀번호를 변경해야 다른 화면을 이용할 수 있습니다.
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/password/change}" method="post">
                <div class="mb-3">
                    <label class="form-label">현재 비밀번호</label>
                    <input type="password" name="currentPassword" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">신규 비밀번호</label>
                    <input type="password" name="newPassword" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">신규 비밀번호 확인</label>
                    <input type="password" name="confirmPassword" class="form-control" required>
                </div>
                <ul class="small text-muted">
                    <li>최소 10자 이상, 영문 대/소문자·숫자·특수문자 중 3종류 이상 조합</li>
                    <li>동일하거나 연속된 문자를 3자 이상 사용할 수 없습니다</li>
                    <li>아이디를 포함할 수 없고, 최근 사용한 비밀번호는 재사용할 수 없습니다</li>
                </ul>
                <div class="d-flex justify-content-between">
                    <a th:unless="${forced}" th:href="@{/dashboard}" class="btn btn-default">취소</a>
                    <button type="submit" class="btn btn-primary ms-auto">변경</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
